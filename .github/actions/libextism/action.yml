on: [workflow_call]

name: libextism

inputs:
  token:
    description: 'A Github PAT'
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v3
      with:
        repository: extism/cli
        path: .extism-cli
    - uses: ./.extism-cli/.github/actions/extism-cli
    - name: Install
      shell: bash
      run: sudo extism lib install --version v1.21.0 --github-token "${{ inputs.token }}"
